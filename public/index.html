<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Hildebrando & Leite Advogados Associados.">
  <title>Hildebrando & Leite</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #001722;
      --blue: #64adff;
      --text: #f7fbff;
      --muted: #9bb9d2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background:
        radial-gradient(circle at 50% 15%, rgba(100, 173, 255, 0.18), transparent 30%),
        linear-gradient(135deg, #000f19, var(--bg));
      color: var(--text);
      display: flex;
      font-family: Arial, sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }

    main {
      max-width: 560px;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: clamp(34px, 7vw, 58px);
      line-height: 1;
      margin: 0 0 16px;
    }

    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 24px;
    }

    a {
      border: 1px solid rgba(100, 173, 255, 0.55);
      border-radius: 999px;
      color: var(--text);
      display: inline-flex;
      font-weight: 700;
      margin: 6px;
      padding: 13px 20px;
      text-decoration: none;
      text-transform: uppercase;
    }

    a.primary {
      background: linear-gradient(135deg, #70b7ff, #4d83ff);
      border-color: transparent;
      box-shadow: 0 0 28px rgba(77, 131, 255, 0.34);
    }
  </style>
  <script>
    (function () {
      var mobileBreakpoint = 920;
      var version = "20260519e";
      var target = window.matchMedia("(max-width: " + mobileBreakpoint + "px)").matches ? "mobile.html" : "desktop.html";
      var search = window.location.search || ("?v=" + version);
      window.location.replace(target + search + window.location.hash);
    })();
  </script>
</head>
<body>
  <main>
    <h1>Hildebrando & Leite</h1>
    <p>Escolha a versão do site para continuar.</p>
    <a class="primary" href="desktop.html">Versão desktop</a>
    <a href="mobile.html">Versão mobile</a>
  </main>
</body>
</html>
